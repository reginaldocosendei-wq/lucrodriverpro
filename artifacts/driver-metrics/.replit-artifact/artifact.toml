kind = "web"
previewPath = "/"
title = "DriverMetrics"
version = "1.0.0"
id = "artifacts/driver-metrics"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19323

[services.development]
run = "pnpm --filter @workspace/driver-metrics run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/driver-metrics", "run", "build" ]
publicDir = "artifacts/driver-metrics/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/download"
to = "/api/download"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19323"
BASE_PATH = "/"
