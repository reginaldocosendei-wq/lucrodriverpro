name: Build APK

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install deps
        run: pnpm install --no-frozen-lockfile

      - name: Install Capacitor (FIX ROOT)
        run: pnpm add @capacitor/core @capacitor/cli @capacitor/android -w

      - name: Build web (não travar)
        run: pnpm run build || echo "skip build"

      - name: Init Capacitor (FORÇA CRIAÇÃO)
        run: |
          npx cap init app com.app.app --web-dir=dist || echo "já existe"

      - name: Add Android (GARANTE PASTA)
        run: |
          npx cap add android || echo "já existe"

      - name: Sync
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          ls -la
          ls -la android || echo "android não existe"
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: android/app/build/outputs/apk/debug/*.apk
