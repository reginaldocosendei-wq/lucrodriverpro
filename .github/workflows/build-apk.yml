name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build web app
        run: pnpm build || npm run build || echo "No build step"

      - name: Install Capacitor
        run: pnpm add -w @capacitor/core @capacitor/cli @capacitor/android

      - name: Init Capacitor (force clean)
        run: |
          rm -rf android
          npx cap init app com.lucrodriverpro.app --web-dir=dist || true

      - name: Add Android (clean)
        run: npx cap add android

      - name: Copy build
        run: npx cap copy

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: android/app/build/outputs/apk/debug/app-debug.apk
