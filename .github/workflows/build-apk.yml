name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build web
        run: pnpm run build || echo "Sem build web, seguindo mesmo assim"

      - name: Pack project fallback
        run: |
          rm -rf app-build
          mkdir -p app-build
          cp -r . app-build/

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: app-build
