name: Build APK

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install deps
        run: pnpm install --no-frozen-lockfile

      - name: Instalar Capacitor (CORRETO)
        run: |
          pnpm add -w @capacitor/core @capacitor/cli @capacitor/android

      - name: Build web (ignorar erro)
        run: pnpm run build || echo "build skip"

      - name: Reset Android (LIMPO)
        run: rm -rf android

      - name: Criar projeto Capacitor LIMPO
        run: |
          npx cap init "Lucro Driver" com.lucro.driver --web-dir=dist || true
          npx cap add android
          npx cap sync android

      - name: Corrigir config Android (CRÍTICO)
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK (FORÇADO)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: android/app/build/outputs/apk/debug/*.apk
