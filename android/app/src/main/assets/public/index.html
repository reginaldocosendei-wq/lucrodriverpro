<!DOCTYPE html>
<html lang="pt-BR" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="google" content="notranslate">
    <meta http-equiv="Content-Language" content="pt-BR">

    <!-- Viewport: no zoom for native-app feel, safe-area support -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <title>Lucro Driver</title>

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="alternate icon" href="/images/icon-192.png" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Lucro Driver" />
    <link rel="apple-touch-icon" href="/images/apple-touch-icon.png" />

    <!-- Android / Chrome -->
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Lucro Driver" />

    <!-- SEO / Social -->
    <meta name="description" content="Seu painel inteligente de ganhos para motoristas de aplicativo" />
    <meta name="robots" content="noindex" />

    <!-- Prevent phone number detection -->
    <meta name="format-detection" content="telephone=no" />

    <!-- MS Tiles -->
    <meta name="msapplication-TileColor" content="#0a0a0a" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- Preconnect to fonts for speed -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Inline critical style: dark bg before JS loads (prevents flash) -->
    <style>
      html, body { background-color: #0a0a0a; margin: 0; padding: 0; }
      #root { min-height: 100dvh; }
      #splash-screen {
        position: fixed; inset: 0; z-index: 9999;
        background: #0a0a0a;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        transition: opacity 0.4s ease;
      }
      #splash-screen.hidden { opacity: 0; pointer-events: none; }
    </style>
    <script type="module" crossorigin src="/assets/index-SyreoufC.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-DYe-ttho.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
